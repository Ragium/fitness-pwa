<div class="workout-form-container">
    <mat-card>
      <mat-card-header>
        <mat-card-title>Új súlyzós edzés</mat-card-title>
      </mat-card-header>
      <mat-card-content>
        <form [formGroup]="workoutForm" (ngSubmit)="onSubmit()">
          <div class="form-row">
            <mat-form-field>
              <mat-label>Edzés neve</mat-label>
              <input matInput formControlName="name" placeholder="Pl. Mellizom edzés">
            </mat-form-field>
          </div>
  
  
          <div class="form-row">
            <mat-form-field>
              <mat-label>Összesített súly (kg)</mat-label>
              <input matInput type="number" formControlName="totalWeight" min="0" readonly>
              <mat-hint>Az összes gyakorlat súlyának összege</mat-hint>
            </mat-form-field>
          </div>
  
          <div class="form-row">
            <mat-form-field>
              <mat-label>Dátum</mat-label>
              <input matInput [matDatepicker]="picker" formControlName="date">
              <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
              <mat-datepicker #picker></mat-datepicker>
            </mat-form-field>
          </div>
  
          <div class="form-row">
            <mat-form-field>
              <mat-label>Megjegyzések</mat-label>
              <textarea matInput formControlName="notes" rows="3"></textarea>
            </mat-form-field>
          </div>
  
          <div class="exercises-section">
            <h3>Gyakorlatok</h3>
            <div formArrayName="exercises">
              <div *ngFor="let exercise of exercises.controls; let i=index" [formGroupName]="i" class="exercise-form">
                <div class="form-row">
                  <mat-form-field>
                    <mat-label>Gyakorlat neve</mat-label>
                    <input matInput formControlName="name">
                  </mat-form-field>
                </div>
                <div class="form-row">
                  <mat-form-field>
                    <mat-label>Testrész</mat-label>
                    <mat-select formControlName="type">
                      <mat-option value="chest">Mellizom</mat-option>
                      <mat-option value="back">Hátizom</mat-option>
                      <mat-option value="legs">Lábizom</mat-option>
                      <mat-option value="shoulders">Vállizom</mat-option>
                      <mat-option value="arms">Karizom</mat-option>
                      <mat-option value="abs">Hasizom</mat-option>
                      <mat-option value="triceps">Tricepsz</mat-option>
                      <mat-option value="biceps">Bicepsz</mat-option>
                      <mat-option value="cardio">Kardió</mat-option>
                    </mat-select>
                  </mat-form-field>
                </div>
                <div class="form-row">
                  <mat-form-field>
                    <mat-label>Szériák száma</mat-label>
                    <input matInput type="number" formControlName="sets" min="1">
                  </mat-form-field>
                </div>
                <div class="form-row">
                  <mat-form-field>
                    <mat-label>Ismétlések száma</mat-label>
                    <input matInput type="number" formControlName="reps" min="1">
                  </mat-form-field>
                </div>
                <div class="form-row">
                  <mat-form-field>
                    <mat-label>Súly (kg)</mat-label>
                    <input matInput type="number" formControlName="weight" min="0" required>
                    <mat-error *ngIf="exercises.at(i).get('weight')?.hasError('required')">
                      A súly megadása kötelező
                    </mat-error>
                  </mat-form-field>
                </div>
                <button mat-icon-button color="warn" type="button" (click)="removeExercise(i)">
                  <mat-icon>delete</mat-icon>
                </button>
              </div>
            </div>
            <button mat-stroked-button type="button" (click)="addExercise()">
              <mat-icon>add</mat-icon>
              Új gyakorlat
            </button>
          </div>
  
          <div class="form-actions">
            <button mat-button type="button" (click)="cancel()">Mégse</button>
            <button mat-raised-button color="primary" type="submit" [disabled]="!workoutForm.valid || isLoading">
              <mat-spinner diameter="20" *ngIf="isLoading"></mat-spinner>
              <span *ngIf="!isLoading">Létrehozás</span>
            </button>
          </div>
        </form>
      </mat-card-content>
    </mat-card>
  </div>
