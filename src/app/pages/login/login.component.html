<div class="login-container">
    <mat-card>
      <mat-card-header>
        <mat-card-title>Bejelentkezés</mat-card-title>
      </mat-card-header>
      <mat-card-content>
        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
          <div class="form-row">
            <mat-form-field>
              <mat-label> Email</mat-label>
              <input matInput formControlName="email" placeholder="Adja meg az email címet">
              <mat-error *ngIf="loginForm.get('email')?.hasError('required')">
                Email megadása kötelező
              </mat-error>
            </mat-form-field>
          </div>
  
          <div class="form-row">
            <mat-form-field>
              <mat-label>Jelszó</mat-label>
              <input matInput formControlName="password" placeholder="Adja meg a jelszót" type="password">
              <mat-error *ngIf="loginForm.get('password')?.hasError('required')">
                A jelszó megadása kötelező
              </mat-error>
            </mat-form-field>
          </div>
  
          <div class="form-actions">
            <div class="remember-me">
              <mat-checkbox formControlName="rememberMe">Emlékezz rám</mat-checkbox>
              <a mat-button color="primary" routerLink="/forgot-password">Elfelejtett jelszó?</a>
            </div>
            <button mat-raised-button color="primary" type="submit" [disabled]="!loginForm.valid || isLoading">
              <mat-spinner diameter="20" *ngIf="isLoading"></mat-spinner>
              <span *ngIf="!isLoading">Bejelentkezés</span>
            </button>
          </div>
        </form>
      </mat-card-content>
      <mat-card-actions>
        <button mat-button routerLink="/register">Nincs még fiókja? Regisztráljon</button>
      </mat-card-actions>
    </mat-card>
  </div>
