<div class="stats-container">
  <div class="charts-grid">
    <mat-card class="chart-card">
      <mat-card-header>
        <mat-card-title>Edzéstípusok eloszlása</mat-card-title>
      </mat-card-header>
      <mat-card-content>
        <canvas #pieChart></canvas>
      </mat-card-content>
    </mat-card>

    <mat-card class="chart-card">
      <mat-card-header>
        <mat-card-title>Heti edzések súlya</mat-card-title>
      </mat-card-header>
      <mat-card-content>
        <canvas #lineChart></canvas>
      </mat-card-content>
    </mat-card>

    <mat-card class="chart-card">
      <mat-card-header>
        <mat-card-title>Testúly követése</mat-card-title>
      </mat-card-header>
      <mat-card-content>
        <canvas #weightChart weightTracking [user]="currentUser"></canvas>
      </mat-card-content>
    </mat-card>
  </div>

  <mat-card class="recent-workouts">
    <mat-card-header>
      <mat-card-title>Legutóbbi edzések</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <table mat-table [dataSource]="displayedWorkouts" class="mat-elevation-z8">
        <ng-container matColumnDef="date">
          <th mat-header-cell *matHeaderCellDef>Dátum</th>
          <td mat-cell *matCellDef="let workout">{{workout.date | date:'fullDate':'hu-HU'}}</td>
        </ng-container>

        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef>Név</th>
          <td mat-cell *matCellDef="let workout">{{workout.name}}</td>
        </ng-container>

        <ng-container matColumnDef="type">
          <th mat-header-cell *matHeaderCellDef>Típus</th>
          <td mat-cell *matCellDef="let workout">{{ getExerciseTypes(workout) }}</td>
        </ng-container>

        <ng-container matColumnDef="totalWeight">
          <th mat-header-cell *matHeaderCellDef>Összesített súly</th>
          <td mat-cell *matCellDef="let workout">{{workout.totalWeight | totalWeight}}</td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>
      <div class="load-more-container" *ngIf="hasMoreWorkouts && !isLoading">
        <button mat-raised-button color="accent" (click)="loadMoreWorkouts()">
          <mat-icon>expand_more</mat-icon>
          Mutass többet
        </button>
      </div>
    </mat-card-content>
  </mat-card>

  <div *ngIf="isLoading" class="loading">
    <mat-spinner diameter="40"></mat-spinner>
    <p>Adatok betöltése...</p>
  </div>
</div>
