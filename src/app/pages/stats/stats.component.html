<div class="stats-container">
  <mat-card>
    <mat-card-header>
      <mat-card-title>Statisztikák</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <div class="charts-container">
        <div class="chart-wrapper">
          <canvas #pieChart></canvas>
        </div>
        <div class="chart-wrapper">
          <canvas #lineChart></canvas>
        </div>
      </div>

      <div class="recent-workouts">
        <h3>Legutóbbi edzések</h3>
        <table mat-table [dataSource]="recentWorkouts" class="mat-elevation-z8">
          <ng-container matColumnDef="date">
            <th mat-header-cell *matHeaderCellDef>Dátum</th>
            <td mat-cell *matCellDef="let workout">{{workout.date | date:'yyyy.MM.dd'}}</td>
          </ng-container>

          <ng-container matColumnDef="name">
            <th mat-header-cell *matHeaderCellDef>Név</th>
            <td mat-cell *matCellDef="let workout">{{workout.name}}</td>
          </ng-container>

          <ng-container matColumnDef="type">
            <th mat-header-cell *matHeaderCellDef>Típus</th>
            <td mat-cell *matCellDef="let workout">
              {{workout.exercises[0]?.type | titlecase}}
            </td>
          </ng-container>

          <ng-container matColumnDef="totalWeight">
            <th mat-header-cell *matHeaderCellDef>Összesített súly</th>
            <td mat-cell *matCellDef="let workout">
              {{calculateTotalWeight(workout)}} kg
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        </table>
      </div>
    </mat-card-content>
  </mat-card>
</div>
